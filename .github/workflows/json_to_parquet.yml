name: JSON → Parquet (streaming, resumable)

# ─────────────────────────────────────────────────────────────────────────────
# What this workflow does
# ─────────────────────────────────────────────────────────────────────────────
# Converts Gdrive:users_data_extracted/users_data.json (446 GB) to a series
# of compressed Parquet files in Gdrive:users_data_parquet/.
#
# The conversion is RESUMABLE:
#   • After each output part is uploaded, a checkpoint is saved to Drive.
#   • Re-triggering the workflow picks up exactly where the previous run ended.
#   • No data is re-read or duplicated between runs.
#
# At ~10 MB/s Drive throughput, the full conversion takes ~3 × 6-hour runs.
# Just re-trigger this workflow until the script prints "Conversion COMPLETE".
#
# Force a restart from scratch:
#   Trigger the workflow with force_restart = true.
#   This ignores the existing checkpoint and overwrites all output parts.
#
# Required secret:
#   RCLONE_CONF — base64-encoded content of your rclone.conf
#   (generate with:  base64 -w0 ~/.config/rclone/rclone.conf)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      force_restart:
        description: 'Start from scratch — ignore existing checkpoint and re-convert'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6-hour hard cap per run; re-trigger to continue

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Cache pip packages ─────────────────────────────────────────────
      #     pyarrow is ~100 MB; caching saves ~1-2 min on each re-run.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyarrow-14

      # ── 4. Python dependencies ────────────────────────────────────────────
      #     Only pyarrow is needed.  It bundles zstd internally — no separate
      #     zstandard or libyajl2 package required.
      - name: Install Python packages
        run: pip install "pyarrow>=14.0"

      # ── 5. rclone (no FUSE — we use rclone cat) ───────────────────────────
      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      # ── 6. rclone config from repository secret ───────────────────────────
      - name: Configure rclone
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" | base64 -d > ~/.config/rclone/rclone.conf
          echo "✅ rclone config written"
          rclone listremotes

      # ── 7. Run the converter ─────────────────────────────────────────────
      - name: Convert JSON → Parquet
        env:
          FORCE_RESTART: ${{ github.event.inputs.force_restart }}
        run: python3 json_to_parquet.py

      # ── 8. Upload run log as a downloadable artifact ─────────────────────
      #     if: always() ensures the log is captured even on timeout / error.
      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parquet-run-log-${{ github.run_number }}
          path: |
            convert_checkpoint.json
          retention-days: 30
          if-no-files-found: ignore
